<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TopTech Azerbaijan</title>
    <style>
        /* Apple Dizayn Sistemi və Rənglər */
        :root {
            --apple-bg: #FFFFFF; /* Tam ağ fon */
            --apple-white: #FFFFFF;
            --toptech-red: #FF3B30; /* Canlı Apple Qırmızısı */
            --apple-text-main: #1D1D1F;
            --apple-text-sub: #86868B;
            --logo-size: 120px; /* Loqonun ölçüsünü buradan istədiyin kimi böyüdüb-kiçildə bilərsən */
}

/* Saytdakı loqonu böyütmək üçün */
.splash-logo-container img, 
.logo, 
img[alt*="Logo"], 
img[alt*="logo"] {
    width: var(--logo-size) !important;
    height: auto !important;
}
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--apple-bg);
            color: var(--apple-text-main);
            overflow-x: hidden;
        }

        /* --- ✨ 1. AÇILIŞ ANİMASİYASI (SPLASH SCREEN) --- */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: var(--apple-white);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: fadeOut 0.4s ease-in-out 1s forwards; /* 1 saniyəlik sürətli açılış */
        }

        .splash-logo-container {
            text-align: center;
            animation: scaleUp 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .splash-img {
            width: 260px; /* Açılışda Böyük Loqo */
            height: auto;
            max-width: 85vw;
        }

        /* --- 📱 MAIN CONTAINER --- */
        #main-content {
            opacity: 0;
            animation: fadeInContent 0.6s ease-out 1.2s forwards;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* --- 🟥 BÖYÜK TOPTECH LOQOSU VƏ MƏTN --- */
        .brand-header {
            text-align: center;
            margin-top: 20px;
            margin-bottom: 40px;
            width: 100%;
            max-width: 480px;
        }

        .logo-wrapper {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }

        .logo-wrapper img {
            width: 320px; /* Səhifədə Çox Böyük və Nəzərəçarpan Loqo */
            height: auto;
            max-width: 90vw;
        }

        .main-title {
            font-size: 2.6rem; /* Daha böyük başlıq texti */
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--toptech-red); /* Tamamilə Qırmızı Mətn */
            line-height: 1.2;
        }

        .tagline {
            font-size: 1.2rem;
            color: var(--apple-text-sub);
            font-weight: 500;
            margin-top: 8px;
        }

        /* --- 📦 SƏHİFƏ STRUKTURU (ZƏRİF KART SİSTEMİ) --- */
        .card {
            background: var(--apple-white);
            border-radius: 24px;
            padding: 30px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06); /* Ağ fonda görünməsi üçün zərif kölgə */
            margin-bottom: 24px;
            border: 1px solid #F2F2F7;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.09);
        }

        .section-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--apple-text-sub);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- 🔗 SOSİAL ŞƏBƏKƏ LINKLƏRİ --- */
        .social-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: #F5F5F7;
            border-radius: 16px;
            text-decoration: none;
            color: var(--apple-text-main);
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .social-btn svg {
            width: 24px;
            height: 24px;
            fill: var(--apple-text-main);
            transition: fill 0.2s ease;
        }

        /* Hover Effektləri (Brend Rəngləri) */
        .social-btn:hover {
            background-color: var(--apple-text-main);
            color: var(--apple-white);
        }

        .social-btn:hover svg {
            fill: var(--apple-white);
        }

        .btn-instagram:hover { background-color: #E1306C; }
        .btn-tiktok:hover { background-color: #000000; }
        .btn-facebook:hover { background-color: #1877F2; }
        .btn-youtube:hover { background-color: #FF0000; }
        
        /* WhatsApp Düyməsi */
        .btn-whatsapp {
            grid-column: span 2;
            background-color: #25D366;
            color: white;
            justify-content: center;
            font-size: 1.1rem;
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.15);
        }
        .btn-whatsapp svg { fill: white; }
        .btn-whatsapp:hover {
            background-color: #20BA5A;
            transform: scale(1.02);
        }

        /* --- 📞 ƏLAQƏ VƏ ÜNVAN --- */
        .contact-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 0;
            border-bottom: 1px solid #F2F2F7;
            text-decoration: none;
            color: var(--apple-text-main);
            font-weight: 500;
        }

        .contact-item:last-child {
            border-bottom: none;
        }

        .contact-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: #F5F5F7;
            border-radius: 50%;
            color: var(--toptech-red);
        }

        .contact-icon svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .contact-info p {
            font-size: 0.85rem;
            color: var(--apple-text-sub);
        }
        .contact-info span {
            font-size: 1rem;
            font-weight: 600;
        }

        /* --- 📐 ANİMASİYALAR --- */
        @keyframes scaleUp {
            0% { transform: scale(0.85); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes fadeOut {
            0% { opacity: 1; pointer-events: auto; }
            100% { opacity: 0; pointer-events: none; visibility: hidden; }
        }

        @keyframes fadeInContent {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- 📱 MOBİL UYĞUNLUQ --- */
        @media (max-width: 480px) {
            .main-title { font-size: 2.1rem; }
            .logo-wrapper img { width: 260px; }
            .card { padding: 20px; }
            .social-grid { grid-template-columns: 1fr; }
            .btn-whatsapp { grid-column: span 1; }
        }
    </style>
</head>
