<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TopTech Azerbaijan</title>
    <style>
        /* --- 1. GLOBAL RƏNGLƏR VƏ ÖLÇÜLƏR (Apple Dizayn Sistemi) --- */
        :root {
            --apple-bg: #FFFFFF; /* Tam ağ fon */
            --apple-white: #FFFFFF;
            --toptech-red: #FF3B30; /* Canlı Apple Qırmızısı */
            --apple-text-main: #1D1D1F;
            --apple-text-sub: #86868B;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--apple-bg);
            color: var(--apple-text-main);
            overflow-x: hidden;
        }

        /* --- 2. AÇILIŞ ANİMASİYASI (SPLASH SCREEN) --- */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: var(--apple-white);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: fadeOut 0.4s ease-in-out 1s forwards; /* 1 saniyəlik sürətli açılış */
        }

        /* --- 3. LOQO BÖYÜTMƏ (3 DƏFƏ) --- */
        .splash-logo-container {
            text-align: center;
            transform: scale(3.0) !important; /* Loqonu 3 dəfə böyüdür */
            transform-origin: center !important;
            animation: scaleUp 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            margin-bottom: 25px;
        }

        /* --- 4. WHATSAPP LOGOSUNDAKI YAYINMANI DÜZƏLTMƏK ÜÇÜN --- */
        .whatsapp-container, 
        .whatsapp-logo, 
        [class*="whatsapp"], 
        [class*="wa-"], 
        .fa-whatsapp {
            display: inline-flex !important;
            align-items: center !important;
            justify-content: center !important;
            vertical-align: middle !important;
            transform: none !important; /* Kənar sürüşmələri sıfırlayır */
        }

        /* --- 5. TOPTECH AZERBAIJAN YAZISININ STANDART QIRMIZI RƏNGİ --- */
        h1, .brand-name, .title, .main-title, #brand-heading {
            color: var(--toptech-red) !important;
        }

        /* --- ANİMASİYA PARÇALARI --- */
        @keyframes scaleUp {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(3.0); opacity: 1; }
        }

        @keyframes fadeOut {
            from { opacity: 1; visibility: visible; }
            to { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-logo-container">
            <img src="logo.png" alt="TopTech Logo" style="max-width: 100%; height: auto;">
            <h1 class="brand-name">TopTech Azerbaijan</h1>
        </div>
    </div>

    <div class="whatsapp-container" style="position: fixed; bottom: 20px; right: 20px; z-index: 999;">
        <a href="https://wa.me/yournumber" target="_blank" class="whatsapp-logo">

</html>
